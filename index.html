<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <title>STICKMAN.EXE</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      #game { width: 100vw; height: 100vh; }
      canvas { image-rendering: pixelated; touch-action: none; }

      /* Подсказка повернуть телефон (когда альбомную ориентацию не удалось зафиксировать, напр. на iOS) */
      #rotate-hint { display: none; }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-hint {
          display: flex; gap: 10px; align-items: center; justify-content: center;
          position: fixed; left: 50%; top: 10px; transform: translateX(-50%);
          z-index: 100000; pointer-events: none;
          background: rgba(20, 0, 0, 0.92); border: 2px solid #aa0000; border-radius: 10px;
          color: #fff; font-family: monospace; font-size: 15px; line-height: 1.3;
          padding: 8px 14px; text-align: center; max-width: 92vw;
        }
        #rotate-hint .rh-ico {
          color: #ff4444; font-size: 22px; display: inline-block;
          animation: rh-rot 1.6s ease-in-out infinite;
        }
        @keyframes rh-rot { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-hint"><span class="rh-ico">&#8635;</span> Поверни телефон горизонтально</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
